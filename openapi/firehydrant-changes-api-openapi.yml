openapi: 3.1.0
info:
  title: FireHydrant REST Audits Changes API
  description: Incident management platform exposing programmatic access to incidents, services, teams, environments, runbooks, change events, on-call schedules, Signals event sources, status pages, retrospectives, and integrations. Authentication is by Bot User API token presented as a Bearer token.
  version: '1.0'
  contact:
    name: FireHydrant
    url: https://docs.firehydrant.com/reference
servers:
- url: https://api.firehydrant.io/v1
  description: Production
security:
- bearerAuth: []
tags:
- name: Changes
paths:
  /changes:
    get:
      summary: List changes
      operationId: listChanges
      responses:
        '200':
          description: Changes
      tags:
      - Changes
    post:
      summary: Create a change entry
      operationId: createChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                identifier:
                  type: string
      responses:
        '201':
          description: Created
      tags:
      - Changes
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

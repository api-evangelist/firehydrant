openapi: 3.1.0
info:
  title: FireHydrant REST Audits Functionalities API
  description: Incident management platform exposing programmatic access to incidents, services, teams, environments, runbooks, change events, on-call schedules, Signals event sources, status pages, retrospectives, and integrations. Authentication is by Bot User API token presented as a Bearer token.
  version: '1.0'
  contact:
    name: FireHydrant
    url: https://docs.firehydrant.com/reference
servers:
- url: https://api.firehydrant.io/v1
  description: Production
security:
- bearerAuth: []
tags:
- name: Functionalities
paths:
  /functionalities:
    get:
      summary: List functionalities
      operationId: listFunctionalities
      responses:
        '200':
          description: Functionalities
      tags:
      - Functionalities
    post:
      summary: Create a functionality
      operationId: createFunctionality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created
      tags:
      - Functionalities
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

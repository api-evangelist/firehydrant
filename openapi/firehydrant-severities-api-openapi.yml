openapi: 3.1.0
info:
  title: FireHydrant REST Audits Severities API
  description: Incident management platform exposing programmatic access to incidents, services, teams, environments, runbooks, change events, on-call schedules, Signals event sources, status pages, retrospectives, and integrations. Authentication is by Bot User API token presented as a Bearer token.
  version: '1.0'
  contact:
    name: FireHydrant
    url: https://docs.firehydrant.com/reference
servers:
- url: https://api.firehydrant.io/v1
  description: Production
security:
- bearerAuth: []
tags:
- name: Severities
paths:
  /severities:
    get:
      summary: List severities
      operationId: listSeverities
      responses:
        '200':
          description: Severities
      tags:
      - Severities
    post:
      summary: Create a severity
      operationId: createSeverity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - slug
              properties:
                slug:
                  type: string
                description:
                  type: string
                position:
                  type: integer
      responses:
        '201':
          description: Created
      tags:
      - Severities
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
